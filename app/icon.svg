<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    :root {
      --bg-color: #171717;
      --fg-color: #f5f5f5;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #ffffff;
        --fg-color: #171717;
      }
    }
    .bg {
      fill: var(--bg-color);
      transition: fill 0.3s ease;
    }
    .fg {
      stroke: var(--fg-color);
      transition: stroke 0.3s ease;
    }
  </style>
  <rect width="512" height="512" rx="128" class="bg" />
  <path d="M 136 140 L 136 372 M 136 140 L 196 320 L 256 140 M 256 140 L 256 372 M 256 256 L 376 256 M 376 140 L 376 372"
        stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" class="fg" />
</svg>
