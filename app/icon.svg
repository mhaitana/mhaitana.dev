<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    :root {
      --bg-color: #101112;
      --primary-color: #7595ff;
      --stroke-color: #f2f0e9;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f6f4ee;
        --primary-color: #2558e6;
        --stroke-color: #111214;
      }
    }
    .bg {
      fill: var(--bg-color);
      stroke: var(--stroke-color);
      stroke-width: 16;
      transition: fill 0.3s ease, stroke 0.3s ease;
    }
    .grid-lines {
      stroke: var(--primary-color);
      stroke-width: 2;
      opacity: 0.12;
      transition: stroke 0.3s ease;
    }
    .shadow {
      stroke: var(--primary-color);
      stroke-width: 48;
      stroke-linecap: square;
      stroke-linejoin: miter;
      fill: none;
      opacity: 0.85;
      transition: stroke 0.3s ease;
    }
    .fg {
      stroke: var(--stroke-color);
      stroke-width: 48;
      stroke-linecap: square;
      stroke-linejoin: miter;
      fill: none;
      transition: stroke 0.3s ease;
    }
  </style>
  <!-- Background Rect -->
  <rect width="496" height="496" x="8" y="8" rx="96" class="bg" />
  
  <!-- Technical Grid -->
  <path d="M 8 128 L 504 128 M 8 256 L 504 256 M 8 384 L 504 384 M 128 8 L 128 504 M 256 8 L 256 504 M 384 8 L 384 504" class="grid-lines" />
  
  <!-- Neo-brutalist Offset Shadow -->
  <path d="M 136 140 L 136 372 M 136 140 L 196 320 L 256 140 M 256 140 L 256 372 M 256 256 L 376 256 M 376 140 L 376 372" class="shadow" transform="translate(14, 14)" />
  
  <!-- Foreground Monogram -->
  <path d="M 136 140 L 136 372 M 136 140 L 196 320 L 256 140 M 256 140 L 256 372 M 256 256 L 376 256 M 376 140 L 376 372" class="fg" />
</svg>
